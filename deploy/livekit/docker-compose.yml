# Self-hosted LiveKit stack for Iris (Lighthouse Inn AI receptionist).
#
# Services:
#   redis           — coordination for LiveKit Server, SIP, and Egress.
#                     Persisted to /opt/iris-backend/redis-data so SIP trunks
#                     and dispatch rules survive container restarts.
#   livekit-server  — WebRTC SFU. Host networking required for RTC media on
#                     UDP 50000-50100 to traverse the host firewall cleanly.
#   livekit-sip     — SIP gateway. Host networking required so UDP 5060 SIP
#                     and the RTP media range (10000-20000) reach Twilio.
#   egress          — audio-only OGG recording per call, written to
#                     /opt/iris-backend/recordings/ via volume mount. Host
#                     networking so it can reach Redis on 127.0.0.1.
#
# Run from this directory:
#   docker compose up -d
#
# Required adjacent files (gitignored — copy from *.example and fill in
# secrets):
#   livekit.yaml
#   sip.yaml
#   egress.yaml
#
# One-time host setup before first `up`:
#   sudo mkdir -p /opt/iris-backend/redis-data
#   sudo chown 999:999 /opt/iris-backend/redis-data   # redis user inside container

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF (append-only file) gives durability per-write; combined with the
    # default RDB snapshots that means trunks/dispatch rules survive a
    # container restart instead of vanishing into ephemeral memory.
    command: redis-server --appendonly yes
    ports:
      # Expose to 127.0.0.1 only — reachable from all four services
      # (livekit-server, livekit-sip, and egress all use host networking).
      # NOT exposed publicly.
      - "127.0.0.1:6379:6379"
    volumes:
      - /opt/iris-backend/redis-data:/data

  livekit-server:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  livekit-sip:
    image: livekit/sip:latest
    restart: unless-stopped
    command: --config /etc/sip.yaml
    network_mode: host
    volumes:
      - ./sip.yaml:/etc/sip.yaml:ro
    depends_on:
      - redis
      - livekit-server

  egress:
    image: livekit/egress:v1.9.0
    restart: unless-stopped
    # Host networking: same reason as livekit-server and livekit-sip. Bridge
    # mode + host.docker.internal would resolve to the docker0 bridge IP
    # (172.17.0.1), but Redis is bound only to 127.0.0.1, so the bridge IP
    # can't reach it. Easier to put egress on host networking too.
    network_mode: host
    cap_add:
      - SYS_ADMIN  # required by egress's bundled Chrome (even for audio-only)
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
      # Recordings live alongside transcripts at /opt/iris-backend/recordings/.
      # Inside the container, egress writes to /out (referenced by filepath
      # in the dispatch-rule auto-egress config).
      - /opt/iris-backend/recordings:/out
    depends_on:
      - redis
      - livekit-server
