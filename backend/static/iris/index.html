<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris Dashboard</title>
<link rel="stylesheet" href="/iris/static/style.css">
</head>
<body>
<header>
  <h1><a href="#/">Iris Dashboard</a></h1>
  <div class="header-right">
    <span id="call-count" class="muted"></span>
    <button id="refresh-btn" type="button">Refresh</button>
    <!-- AUTH-DISABLED 2026-06-11: change-password button hidden while the
         require_iris_auth gate in backend/app/routes/iris_dashboard.py is
         bypassed. Remove the `hidden` attribute when restoring auth. The
         JS listener for it still binds normally — `hidden` just prevents
         display, so no JS changes are needed. -->
    <button id="change-password-btn" type="button" class="secondary" hidden>Change password</button>
  </div>
</header>

<main id="root">
  <div class="loading">Loading…</div>
</main>

<!-- Change-password modal. Hidden by default; toggled by header button. -->
<div id="password-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="password-modal-title">Change password</h2>
    <form id="password-form">
      <label for="current-password">Current password</label>
      <input id="current-password" type="password" autocomplete="current-password" required>

      <label for="new-password">New password (min <span id="min-pw-len">10</span> characters)</label>
      <input id="new-password" type="password" autocomplete="new-password" required>

      <label for="confirm-password">Confirm new password</label>
      <input id="confirm-password" type="password" autocomplete="new-password" required>

      <div class="modal-message" id="password-message"></div>

      <div class="modal-actions">
        <button type="button" id="password-cancel" class="secondary">Cancel</button>
        <button type="submit" id="password-submit">Update password</button>
      </div>
    </form>
  </div>
</div>

<script src="/iris/static/app.js"></script>
</body>
</html>
